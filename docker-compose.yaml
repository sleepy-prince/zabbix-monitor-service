services:
  zabbix-db:
    image: postgres:17-alpine
    container_name: zabbix-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - "POSTGRES_DB=${POSTGRES_DB:?Ошибка: переменная POSTGRES_DB не задана в .env}"
      - "POSTGRES_USER=${POSTGRES_USER:?Ошибка: переменная POSTGRES_USER не задана в .env}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Ошибка: переменная POSTGRES_PASSWORD не задана в .env}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix-server
    volumes:
      - ./alertscripts:/usr/lib/zabbix/alertscripts
    ports:
      - "10051:10051"
    environment:
      - DB_SERVER_HOST=zabbix-db
      - "POSTGRES_DB=${POSTGRES_DB:?Ошибка: переменная POSTGRES_DB не задана в .env}"
      - "POSTGRES_USER=${POSTGRES_USER:?Ошибка: переменная POSTGRES_USER не задана в .env}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Ошибка: переменная POSTGRES_PASSWORD не задана в .env}"
      - TZ=Europe/Moscow
    depends_on:
      zabbix-db:
        condition: service_healthy

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix-web
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_SERVER_PORT=10051
      - DB_SERVER_HOST=zabbix-db
      - "POSTGRES_DB=${POSTGRES_DB:?Ошибка: переменная POSTGRES_DB не задана в .env}"
      - "POSTGRES_USER=${POSTGRES_USER:?Ошибка: переменная POSTGRES_USER не задана в .env}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Ошибка: переменная POSTGRES_PASSWORD не задана в .env}"
      - PHP_TZ=Europe/Moscow
    ports:
      - "8080:8080"
    depends_on:
      - zabbix-server

volumes:
  pgdata: